<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#0d0716;font-family:'Space Grotesk',system-ui,sans-serif;color:#ffe9a8}
a{color:#35d4b9}a:hover{color:#ffd23f}
input{outline:none}
@keyframes tick{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes rise{0%{transform:translateY(24px);opacity:0}100%{transform:translateY(0);opacity:1}}
</style>
</helmet>
<!-- GARTIC (draw & guess) — standalone game UI, drawer view. Left: scoreboard · center: canvas + tools · right: guess chat.
     Real app: strokes stream over WS; the full-featured canvas component lives in DrawingCanvas.dc.html. -->
<div style="min-height:100vh;background:radial-gradient(ellipse at 50% -20%,rgba(255,120,90,.14),transparent 55%),#1c1230;display:flex;flex-direction:column">

  <div style="display:flex;align-items:center;gap:12px;padding:12px 28px;background:#2b1a3d;border-bottom:2px solid #5a3f7a">
    <span style="font-family:'Alfa Slab One';font-size:14px;color:#0c3d33;background:#35d4b9;border-radius:9px;padding:5px 14px">GARTIC</span>
    <span style="font:600 11px 'Space Mono',monospace;color:rgba(255,233,168,.5)">RD 1/2 · YOU DRAW</span>
    <span style="flex:1"></span>
    <span style="font:700 18px 'Space Mono',monospace;color:{{ hTimerFg }};background:{{ hTimerBg }};border-radius:9px;padding:3px 14px;box-shadow:0 3px 0 {{ hTimerShadow }};animation:{{ hTimerAnim }}">{{ hTimerLabel }}</span>
    <button onClick="{{ restart }}" style="font:700 13px 'Space Grotesk';color:#35d4b9;border:2px solid #35d4b9;background:transparent;border-radius:99px;padding:6px 16px;cursor:pointer" style-hover="background:rgba(53,212,185,.12)">↺ Restart demo</button>
  </div>

  <div style="flex:1;display:flex;gap:24px;width:100%;max-width:1240px;margin:0 auto;box-sizing:border-box;padding:22px 32px 30px">
    <div style="width:230px;flex:none">
      <div style="font:700 11px 'Space Mono',monospace;letter-spacing:.25em;color:rgba(255,233,168,.45);margin-bottom:10px">SCOREBOARD · RD 1/2</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <sc-for list="{{ board }}" as="gb" hint-placeholder-count="5">
          <div style="display:flex;align-items:center;gap:9px;background:#2b1a3d;border:2px solid {{ gb.border }};border-radius:99px;padding:5px 12px 5px 5px">
            <div style="width:28px;height:28px;border-radius:99px;background:#fff8e7;border:2px solid {{ gb.hue }};display:flex;align-items:center;justify-content:center;font:400 6px 'Space Mono',monospace;color:#8a7f60">dd</div>
            <div style="flex:1;font:700 12px 'Space Grotesk';color:#ffe9a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ gb.name }}</div>
            <span style="font:600 8px 'Space Mono',monospace;color:{{ gb.stateColor }}">{{ gb.state }}</span>
            <span style="font-family:'Alfa Slab One';font-size:14px;color:#ffe9a8">{{ gb.pts }}</span>
          </div>
        </sc-for>
      </div>
      <div style="font:400 8px 'Space Mono',monospace;color:rgba(255,233,168,.3);margin-top:9px;text-align:center">GAME POINTS · SESSION POINTS AT THE END</div>
    </div>
    <div style="flex:1.6;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div><div style="font:700 10px 'Space Mono',monospace;letter-spacing:.35em;color:#35d4b9">YOUR SECRET WORD</div><div style="font-family:'Alfa Slab One';font-size:26px;color:#ffe9a8;text-shadow:0 3px 0 #c2452d">CAPIVARA</div></div>
        <div style="font:600 11px 'Space Mono',monospace;color:rgba(255,233,168,.45);text-align:right">{{ guessedLabel }}</div>
      </div>
      <canvas ref="{{ canvasRef }}" width="760" height="560"
        onPointerDown="{{ gDown }}" onPointerMove="{{ gMove }}" onPointerUp="{{ gUp }}" onPointerLeave="{{ gUp }}"
        style="width:100%;aspect-ratio:760/560;background:#fff8e7;border-radius:18px;border:3px solid #35d4b9;box-shadow:0 6px 0 rgba(0,0,0,.35);touch-action:none;cursor:crosshair;display:block"></canvas>
      <div style="display:flex;gap:10px;align-items:center;margin-top:12px">
        <div style="display:flex;gap:5px">
          <sc-for list="{{ swatches }}" as="s" hint-placeholder-count="8">
            <button onClick="{{ s.pick }}" style="width:30px;height:30px;border-radius:99px;background:{{ s.hex }};border:{{ s.border }};cursor:pointer;padding:0"></button>
          </sc-for>
        </div>
        <span style="flex:1"></span>
        <button onClick="{{ toggleEraser }}" style="height:38px;padding:0 14px;border-radius:11px;border:2px solid {{ eraserBorder }};background:{{ eraserBg }};color:{{ eraserFg }};font:700 12px 'Space Grotesk';cursor:pointer">◻ Eraser</button>
        <button onClick="{{ undo }}" style="height:38px;padding:0 14px;border-radius:11px;border:2px solid #5a3f7a;background:#2b1a3d;color:#ffe9a8;font:700 12px 'Space Grotesk';cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.35)" style-active="transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.35)">↩ Undo</button>
        <button onClick="{{ clearAll }}" style="height:38px;padding:0 14px;border-radius:11px;border:none;background:linear-gradient(180deg,#ff6b85,#e84863);color:#fff;font:700 12px 'Space Grotesk';cursor:pointer;box-shadow:0 3px 0 #8f1f33" style-active="transform:translateY(2px);box-shadow:0 1px 0 #8f1f33">Clear</button>
      </div>
    </div>
    <div style="flex:1;max-width:340px;display:flex;flex-direction:column">
      <div style="font:700 11px 'Space Mono',monospace;letter-spacing:.25em;color:rgba(255,233,168,.45);margin-bottom:10px">GUESS CHAT</div>
      <div style="flex:1;background:#2b1a3d;border:2px solid #5a3f7a;border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:8px;overflow:hidden;justify-content:flex-end">
        <sc-for list="{{ chat }}" as="m" hint-placeholder-count="3">
          <div style="font:600 13px 'Space Grotesk';color:{{ m.color }};animation:rise .3s ease-out">{{ m.text }}</div>
        </sc-for>
      </div>
      <div style="background:#1c1230;border:2px dashed #5a3f7a;border-radius:12px;padding:11px 14px;font:400 11px 'Space Mono',monospace;color:rgba(255,233,168,.35);margin-top:10px;text-align:center">YOU'RE DRAWING — NO GUESSING</div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800}}">
class Component extends DCLogic {
  state = { secs: 60, elapsed: 0, chat: [], guessed: 0, color: '#131320', eraser: false, pts: { Dani: 0, Rafa: 0, Bia: 0 } };
  canvasNode = null; undoStack = []; drawing = false;
  setCanvas = (node) => {
    this.canvasNode = node;
    if (node) { this.ctx = node.getContext('2d'); this.ctx.lineCap = 'round'; this.ctx.lineJoin = 'round'; }
  };
  componentDidMount() { this.int = setInterval(() => this.tick(), 1000); }
  componentWillUnmount() { clearInterval(this.int); }
  tick() {
    const s = this.state;
    const next = { secs: Math.max(0, s.secs - 1), elapsed: s.elapsed + 1 };
    const msgs = {
      4: { text: 'Rafa: rato gigante?', color: 'rgba(255,233,168,.75)' },
      8: { text: 'Bia: hamster', color: 'rgba(255,233,168,.75)' },
      13: { text: 'Dani ✓ guessed it! (+18)', color: '#35d4b9', g: 1, who: 'Dani', pts: 18 },
      20: { text: 'Rafa: capivara??', color: 'rgba(255,233,168,.75)' },
      22: { text: 'Rafa ✓ guessed it! (+14)', color: '#35d4b9', g: 1, who: 'Rafa', pts: 14 },
      30: { text: 'Bia ✓ guessed it! (+10)', color: '#35d4b9', g: 1, who: 'Bia', pts: 10 },
    };
    const m = msgs[s.elapsed];
    if (m) {
      next.chat = [...s.chat, m].slice(-7);
      if (m.g) { next.guessed = s.guessed + 1; next.pts = { ...s.pts, [m.who]: m.pts }; }
    }
    this.setState(next);
  }
  pos(e) {
    const r = this.canvasNode.getBoundingClientRect();
    return { x: (e.clientX - r.left) * 760 / r.width, y: (e.clientY - r.top) * 560 / r.height };
  }
  down = (e) => {
    if (!this.ctx) return;
    e.preventDefault();
    e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId);
    this.undoStack.push(this.ctx.getImageData(0, 0, 760, 560));
    if (this.undoStack.length > 20) this.undoStack.shift();
    this.drawing = true;
    const p = this.pos(e), ctx = this.ctx;
    ctx.globalCompositeOperation = this.state.eraser ? 'destination-out' : 'source-over';
    ctx.strokeStyle = this.state.color;
    ctx.lineWidth = this.state.eraser ? 26 : 7;
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + 0.01, p.y + 0.01); ctx.stroke();
  };
  move = (e) => {
    if (!this.drawing) return;
    e.preventDefault();
    const p = this.pos(e);
    this.ctx.lineTo(p.x, p.y); this.ctx.stroke();
  };
  up = () => { this.drawing = false; if (this.ctx) this.ctx.globalCompositeOperation = 'source-over'; };
  renderVals() {
    const s = this.state;
    const palette = ['#131320', '#e84863', '#ff9d3f', '#ffd23f', '#57c75a', '#35d4b9', '#3f8cff', '#b78bff'];
    const swatches = palette.map(hex => ({
      hex,
      pick: () => this.setState({ color: hex, eraser: false }),
      border: (s.color === hex && !s.eraser) ? '3px solid #ffe9a8' : '2px solid rgba(255,255,255,.2)',
    }));
    const rows = [
      { name: 'You ✏️', hue: '#ffd23f', pts: s.guessed * 6, state: 'DRAWING' },
      { name: 'Dani', hue: '#ff4f6f', pts: s.pts.Dani, state: s.pts.Dani ? '✓ GOT IT' : 'GUESSING' },
      { name: 'Rafa', hue: '#b78bff', pts: s.pts.Rafa, state: s.pts.Rafa ? '✓ GOT IT' : 'GUESSING' },
      { name: 'Bia', hue: '#ff9d3f', pts: s.pts.Bia, state: s.pts.Bia ? '✓ GOT IT' : 'GUESSING' },
      { name: 'Gustavo', hue: '#35d4b9', pts: 0, state: 'GUESSING' },
    ].sort((a, b) => b.pts - a.pts);
    const board = rows.map((r, i) => ({ ...r, border: i === 0 && r.pts > 0 ? '#ffd23f' : '#5a3f7a', stateColor: r.state.includes('✓') ? '#35d4b9' : 'rgba(255,233,168,.4)' }));
    const low = s.secs <= 10 && s.secs > 0;
    return {
      hTimerLabel: Math.floor(s.secs / 60) + ':' + String(s.secs % 60).padStart(2, '0'),
      hTimerFg: low ? '#fff' : '#1c1230',
      hTimerBg: low ? 'linear-gradient(180deg,#ff6b85,#e84863)' : '#ffe9a8',
      hTimerShadow: low ? '#8f1f33' : '#c2452d',
      hTimerAnim: low ? 'tick 1s infinite' : 'none',
      canvasRef: this.setCanvas,
      gDown: this.down, gMove: this.move, gUp: this.up,
      swatches, board, chat: s.chat,
      guessedLabel: s.guessed + ' OF 4 GUESSED ✓',
      toggleEraser: () => this.setState(st => ({ eraser: !st.eraser })),
      eraserBg: s.eraser ? '#ffe9a8' : '#2b1a3d',
      eraserFg: s.eraser ? '#1c1230' : '#ffe9a8',
      eraserBorder: s.eraser ? '#ffe9a8' : '#5a3f7a',
      undo: () => { const img = this.undoStack.pop(); if (img && this.ctx) this.ctx.putImageData(img, 0, 0); },
      clearAll: () => { if (this.ctx) { this.undoStack.push(this.ctx.getImageData(0, 0, 760, 560)); this.ctx.clearRect(0, 0, 760, 560); } },
      restart: () => { if (this.ctx) this.ctx.clearRect(0, 0, 760, 560); this.setState({ secs: 60, elapsed: 0, chat: [], guessed: 0, pts: { Dani: 0, Rafa: 0, Bia: 0 } }); },
    };
  }
}

</script>
</body>
</html>
