<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#1c1230;font-family:'Space Grotesk',system-ui,sans-serif}
a{color:#35d4b9}a:hover{color:#ffd23f}
@keyframes tick{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
</style>
</helmet>
<div style="max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#1c1230;touch-action:none">

  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px 8px">
    <div>
      <div style="font:700 9px 'Space Mono',monospace;letter-spacing:.3em;color:#35d4b9">YOU'RE DRAWING</div>
      <div style="font-family:'Alfa Slab One';font-size:20px;color:#ffe9a8;text-shadow:0 3px 0 #c2452d">{{ word }}</div>
    </div>
    <sc-if value="{{ showTimer }}" hint-placeholder-val="{{ true }}">
      <div style="font-family:'Alfa Slab One';font-size:22px;padding:1px 14px;border-radius:9px;background:{{ timerBg }};color:{{ timerColor }};box-shadow:0 4px 0 {{ timerShadow }};animation:{{ timerAnim }}">{{ timeLabel }}</div>
    </sc-if>
  </div>

  <div style="flex:1;padding:0 10px;display:flex;flex-direction:column">
    <canvas ref="{{ canvasRef }}" width="720" height="880"
      onPointerDown="{{ onDown }}" onPointerMove="{{ onMove }}" onPointerUp="{{ onUp }}" onPointerLeave="{{ onUp }}"
      style="width:100%;aspect-ratio:720/880;background:#fff8e7;border-radius:16px;border:3px solid #5a3f7a;box-shadow:0 6px 0 rgba(0,0,0,.35);touch-action:none;cursor:crosshair;display:block"></canvas>
  </div>

  <div style="padding:10px 12px 16px;display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;gap:6px;justify-content:center">
      <sc-for list="{{ tools }}" as="t" hint-placeholder-count="6">
        <button onClick="{{ t.pick }}" title="{{ t.name }}" style="flex:1;max-width:56px;height:46px;border-radius:12px;border:2px solid {{ t.border }};background:{{ t.bg }};color:{{ t.fg }};font:700 17px 'Space Grotesk';cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.35)" style-active="transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.35)">{{ t.icon }}</button>
      </sc-for>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div style="display:flex;gap:5px;flex-wrap:wrap;flex:1;justify-content:center">
        <sc-for list="{{ swatches }}" as="s" hint-placeholder-count="12">
          <button onClick="{{ s.pick }}" style="width:30px;height:30px;border-radius:99px;background:{{ s.hex }};border:{{ s.border }};cursor:pointer;padding:0"></button>
        </sc-for>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;justify-content:space-between">
      <div style="display:flex;gap:6px;align-items:center">
        <sc-for list="{{ sizes }}" as="z" hint-placeholder-count="3">
          <button onClick="{{ z.pick }}" style="width:40px;height:40px;border-radius:12px;border:2px solid {{ z.border }};background:{{ z.bg }};display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0">
            <span style="display:block;width:{{ z.dot }}px;height:{{ z.dot }}px;border-radius:99px;background:#ffe9a8"></span>
          </button>
        </sc-for>
        <button onClick="{{ toggleFill }}" title="Fill shapes" style="height:40px;padding:0 12px;border-radius:12px;border:2px solid {{ fillBorder }};background:{{ fillBg }};color:{{ fillFg }};font:700 11px 'Space Mono',monospace;cursor:pointer">{{ fillLabel }}</button>
      </div>
      <div style="display:flex;gap:6px">
        <button onClick="{{ undo }}" style="height:40px;padding:0 14px;border-radius:12px;border:2px solid #5a3f7a;background:#2b1a3d;color:#ffe9a8;font:700 13px 'Space Grotesk';cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.35)" style-active="transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.35)">↩ Undo</button>
        <button onClick="{{ clearAll }}" style="height:40px;padding:0 14px;border-radius:12px;border:none;background:linear-gradient(180deg,#ff6b85,#e84863);color:#fff;font:700 13px 'Space Grotesk';cursor:pointer;box-shadow:0 3px 0 #8f1f33" style-active="transform:translateY(2px);box-shadow:0 1px 0 #8f1f33">Clear</button>
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:800},&quot;word&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;BANANA&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Game&quot;},&quot;timerSeconds&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:90,&quot;min&quot;:10,&quot;max&quot;:300,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Game&quot;},&quot;showTimer&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Game&quot;}}">
class Component extends DCLogic {
  state = { tool: 'brush', color: '#131320', size: 10, fill: false, secs: null };
  canvas = React.createRef();
  undoStack = [];
  drawing = false;
  start = null;
  snap = null;

  componentDidMount() {
    const c = this.canvas.current;
    this.ctx = c.getContext('2d', { willReadFrequently: true });
    this.ctx.lineCap = 'round';
    this.ctx.lineJoin = 'round';
    const total = this.props.timerSeconds ?? 90;
    this.setState({ secs: total });
    this.tickInt = setInterval(() => {
      this.setState(s => s.secs > 0 ? { secs: s.secs - 1 } : null);
    }, 1000);
  }
  componentWillUnmount() { clearInterval(this.tickInt); }

  pos(e) {
    const r = this.canvas.current.getBoundingClientRect();
    return { x: (e.clientX - r.left) * 720 / r.width, y: (e.clientY - r.top) * 880 / r.height };
  }
  pushUndo() {
    this.undoStack.push(this.ctx.getImageData(0, 0, 720, 880));
    if (this.undoStack.length > 20) this.undoStack.shift();
  }
  applyStyle(erase) {
    const ctx = this.ctx;
    ctx.globalCompositeOperation = erase ? 'destination-out' : 'source-over';
    ctx.strokeStyle = this.state.color;
    ctx.fillStyle = this.state.color;
    ctx.lineWidth = erase ? this.state.size * 2.2 : this.state.size;
  }

  floodFill(x, y) {
    const ctx = this.ctx, W = 720, H = 880;
    const img = ctx.getImageData(0, 0, W, H), d = img.data;
    x = x | 0; y = y | 0;
    const idx = (y * W + x) * 4;
    const hex = this.state.color;
    const fr = parseInt(hex.slice(1, 3), 16), fg = parseInt(hex.slice(3, 5), 16), fb = parseInt(hex.slice(5, 7), 16);
    const tr = d[idx], tg = d[idx + 1], tb = d[idx + 2], ta = d[idx + 3];
    if (tr === fr && tg === fg && tb === fb && ta === 255) return;
    const match = i => {
      const dr = d[i] - tr, dg = d[i + 1] - tg, db = d[i + 2] - tb, da = d[i + 3] - ta;
      return dr * dr + dg * dg + db * db + da * da < 2500;
    };
    const stack = [[x, y]];
    while (stack.length) {
      const [px, py] = stack.pop();
      let x1 = px;
      while (x1 >= 0 && match((py * W + x1) * 4)) x1--;
      x1++;
      let above = false, below = false;
      while (x1 < W && match((py * W + x1) * 4)) {
        const i = (py * W + x1) * 4;
        d[i] = fr; d[i + 1] = fg; d[i + 2] = fb; d[i + 3] = 255;
        if (py > 0) { const m = match(((py - 1) * W + x1) * 4); if (m && !above) { stack.push([x1, py - 1]); above = true; } if (!m) above = false; }
        if (py < H - 1) { const m = match(((py + 1) * W + x1) * 4); if (m && !below) { stack.push([x1, py + 1]); below = true; } if (!m) below = false; }
        x1++;
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  down = (e) => {
    e.preventDefault();
    e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId);
    const p = this.pos(e);
    this.pushUndo();
    const t = this.state.tool;
    if (t === 'bucket') { this.floodFill(p.x, p.y); return; }
    this.drawing = true;
    this.start = p;
    if (t === 'brush' || t === 'eraser') {
      this.applyStyle(t === 'eraser');
      this.ctx.beginPath();
      this.ctx.moveTo(p.x, p.y);
      this.ctx.lineTo(p.x + 0.01, p.y + 0.01);
      this.ctx.stroke();
    } else {
      this.snap = this.ctx.getImageData(0, 0, 720, 880);
    }
  };
  move = (e) => {
    if (!this.drawing) return;
    e.preventDefault();
    const p = this.pos(e), t = this.state.tool, ctx = this.ctx;
    if (t === 'brush' || t === 'eraser') {
      this.applyStyle(t === 'eraser');
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      return;
    }
    ctx.putImageData(this.snap, 0, 0);
    this.applyStyle(false);
    const s = this.start;
    ctx.beginPath();
    if (t === 'line') { ctx.moveTo(s.x, s.y); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    else if (t === 'rect') {
      if (this.state.fill) ctx.fillRect(s.x, s.y, p.x - s.x, p.y - s.y);
      else ctx.strokeRect(s.x, s.y, p.x - s.x, p.y - s.y);
    } else if (t === 'ellipse') {
      ctx.ellipse((s.x + p.x) / 2, (s.y + p.y) / 2, Math.abs(p.x - s.x) / 2, Math.abs(p.y - s.y) / 2, 0, 0, Math.PI * 2);
      this.state.fill ? ctx.fill() : ctx.stroke();
    }
  };
  up = () => {
    if (this.drawing) { this.ctx.globalCompositeOperation = 'source-over'; }
    this.drawing = false;
    this.snap = null;
  };

  renderVals() {
    const st = this.state;
    const toolDefs = [
      ['brush', '✏️', 'Brush'], ['eraser', '◻', 'Eraser'], ['line', '╱', 'Line'],
      ['rect', '▭', 'Rectangle'], ['ellipse', '◯', 'Ellipse'], ['bucket', '🪣', 'Fill bucket'],
    ];
    const tools = toolDefs.map(([id, icon, name]) => ({
      icon, name,
      pick: () => this.setState({ tool: id }),
      bg: st.tool === id ? 'linear-gradient(180deg,#ffd23f,#f5b32a)' : '#2b1a3d',
      fg: st.tool === id ? '#3d1f0e' : '#ffe9a8',
      border: st.tool === id ? '#ffd23f' : '#5a3f7a',
    }));
    const palette = ['#131320', '#ffffff', '#e84863', '#ff9d3f', '#ffd23f', '#57c75a', '#35d4b9', '#3f8cff', '#b78bff', '#ff8ac2', '#8a5a3b', '#9aa0b5'];
    const swatches = palette.map(hex => ({
      hex,
      pick: () => this.setState({ color: hex, tool: st.tool === 'eraser' ? 'brush' : st.tool }),
      border: st.color === hex ? '3px solid #ffe9a8' : '2px solid rgba(255,255,255,.2)',
    }));
    const sizes = [4, 10, 22].map(v => ({
      dot: Math.max(5, v * 0.8),
      pick: () => this.setState({ size: v }),
      bg: st.size === v ? '#3a2751' : '#2b1a3d',
      border: st.size === v ? '#ffe9a8' : '#5a3f7a',
    }));
    const low = st.secs !== null && st.secs <= 10;
    const m = Math.floor((st.secs ?? 0) / 60), s = (st.secs ?? 0) % 60;
    return {
      word: this.props.word ?? 'BANANA',
      showTimer: this.props.showTimer ?? true,
      timeLabel: m + ':' + String(s).padStart(2, '0'),
      timerBg: low ? 'linear-gradient(180deg,#ff6b85,#e84863)' : '#ffe9a8',
      timerColor: low ? '#fff' : '#1c1230',
      timerShadow: low ? '#8f1f33' : '#c2452d',
      timerAnim: low ? 'tick 1s infinite' : 'none',
      canvasRef: this.canvas,
      onDown: this.down, onMove: this.move, onUp: this.up,
      tools, swatches, sizes,
      toggleFill: () => this.setState(s2 => ({ fill: !s2.fill })),
      fillLabel: st.fill ? 'FILL: ON' : 'FILL: OFF',
      fillBg: st.fill ? '#35d4b9' : '#2b1a3d',
      fillFg: st.fill ? '#0c3d33' : 'rgba(255,233,168,.6)',
      fillBorder: st.fill ? '#35d4b9' : '#5a3f7a',
      undo: () => { const img = this.undoStack.pop(); if (img) this.ctx.putImageData(img, 0, 0); },
      clearAll: () => { this.pushUndo(); this.ctx.clearRect(0, 0, 720, 880); },
    };
  }
}

</script>
</body>
</html>
