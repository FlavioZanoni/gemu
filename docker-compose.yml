services:
  server:
    build:
      context: ./server
    environment:
      - WS_ADDR=:8080
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    environment:
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    depends_on:
      - server
    restart: unless-stopped
